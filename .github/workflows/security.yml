name: Security

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/**"
  schedule:
    - cron: "0 19 * * 0" # 毎週月曜 04:00 JST

permissions: {}

jobs:
  backend-security:
    name: Backend Security (Brakeman + bundler-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      # `@v6` や `@v6.0.2` で止めると、Action作者のリポジトリが乗っ取られた際に
      # タグが書き換えられ、次回のCI実行から悪意あるコードが勝手に動く。
      # (2025年のtj-actions/changed-files事件で実際に発生。CIのシークレットが流出した)
      # SHA固定すればコミットは後から書き換え不能なので、この経路を塞げる。
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: "3.4"
          bundler-cache: true
          working-directory: backend
      - run: bundle exec brakeman --no-pager
      - run: bundle exec bundler-audit --update

  frontend-security:
    name: Frontend Security (npm audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
